title: 'Sidebar widgets'
fields:
  -
    handle: sidebar_widgets
    field:
      type: replicator
      display: 'Sidebar widgets'
      localizable: false
      sets:
        items:
          display: Items
          sets:
            form:
              display: Form
              icon: fieldtype-form
              fields:
                -
                  handle: title
                  field:
                    type: text
                    display: Title
                    localizable: false
                -
                  handle: text
                  field:
                    buttons:
                      - bold
                      - italic
                      - removeformat
                      - anchor
                    toolbar_mode: floating
                    container: assets
                    remove_empty_nodes: false
                    type: bard
                    display: Text
                    localizable: false
                -
                  handle: form_picker
                  field:
                    max_items: 1
                    type: form
                    display: 'Form picker'
                    localizable: false
            menu:
              display: Menu
              icon: burger-menu-no-border
              fields:
                -
                  handle: menu_type
                  field:
                    options:
                      -
                        key: subpages
                        value: Undersider
                      -
                        key: collection
                        value: Kollektion
                      -
                        key: entrie
                        value: Advanceret
                    default: subpages
                    type: button_group
                    display: 'Menu type'
                    localizable: false

title: Widgets
fields:
  -
    handle: widgets
    field:
      type: replicator
      display: Widgets
      collapse: accordion
      sets:
        items:
          display: Items
          sets:
            logo:
              display: Logo
              fields:
                -
                  import: logo
            socialmedia_links:
              display: 'Socialmedia links'
              fields:
                -
                  import: socialmedia_links
            search_bar:
              display: 'Search bar'
              fields:
                -
                  import: search
            navigation:
              display: Navigation
              fields:
                -
                  handle: nav_options
                  field:
                    options:
                      -
                        key: default
                        value: 'Default from pages'
                      -
                        key: custom
                        value: 'Custom navigation'
                    type: button_group
                    display: 'Navigation options'
                    default: default
                -
                  handle: include_homepage
                  field:
                    type: toggle
                    display: 'Include homepage'
                    if:
                      nav_options: 'equals default'
                -
                  handle: navigation_picker
                  field:
                    type: navs
                    display: 'Navigation picker'
                    if:
                      nav_options: 'equals custom'
            contact_info:
              display: 'Contact info'
              fields: {  }
            cta_links:
              display: 'Cta links'
              fields:
                -
                  handle: links
                  field: links.links
            multisite:
              display: Multisite
              fields: {  }

title: 'Hero style 4'
fields:
  -
    handle: text
    field:
      buttons:
        - bard-group-sizes-dropdown
        - h1
        - bold
        - italic
        - removeformat
        - anchor
        - bard-group-flow-spacing-dropdown
        - color
      toolbar_mode: floating
      container: assets
      remove_empty_nodes: false
      type: bard
      display: Text
  -
    handle: media
    field:
      container: assets
      max_files: 1
      type: assets
      display: Media
  - import: links
  -
    handle: show_settings
    field:
      type: revealer
      display: 'Show settings'
  -
    handle: settings
    field: common.settings
    config:
      if:
        show_settings: 'equals true'

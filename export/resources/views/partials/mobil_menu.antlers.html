<div 
    id="main-nav" 
    class="mobil_menu fixed top-0 left-0 w-full h-full z-[999] backdrop-blur-sm starting:open:*:opacity-0 starting:open:*:translate-x-1/2" 
    :aria-expanded="showMobilMenu ? 'true' : 'false'"
    x-cloak 
    :open="showMobilMenu ? true : null"
    x-show="showMobilMenu"
    x-transition:enter="transition ease-out duration-300"
    x-transition:enter-start="opacity-0"
    x-transition:enter-end="opacity-100"
    x-transition:leave="transition ease-in duration-300"
    x-transition:leave-start="opacity-100"
    x-transition:leave-end="opacity-0"
>
    <div class="fixed top-0 right-0 h-full w-full max-w-[30rem] bg-light text-dark-shade z-10 shadow-custom_medium  opacity-100 translate-x-0 delay-200 duration-300 ease-[cubic-bezier(0,0.55,0.45,1)] flex flex-col" x-on:click.outside="showMobilMenu = false">
        <div class="flex gap-2 p-700">
            {{ partial:components/socialmedia  }}
            {{ partial:widgets/multisite }}
            <button 
                class="bg-primary-700 ml-auto text-primary-50 size-700 flex items-center justify-center text-light-glare cursor-pointer"
                aria-label="Luk primær navigation"
                type="button"   
                @click="showMobilMenu = false" 
                aria-expanded="showMobilMenu = 'false'"
                aria-controls="main-nav"
            >
                {{ svg src="close" class="h-2/3 w-auto"  }}
            </button>
        </div>
        <nav class="grow flex flex-col overflow-y-auto p-700 pt-0">
            <menu class="space-y-2">
                {{ nav:mobil_nav }}
                    <li>
                        <a class="font-semibold! uppercase font-heading text-600 tracking-tight flex items-center justify-between {{ is_current || is_parent ?= '' }}" href="{{ url }}"><span>{{ title }}</span>{{ if children }} {{ svg src="small-arrow" class="h-2 w-auto" }}{{ endif }}</a>
                    </li>
                {{ /nav:mobil_nav }}
            </menu>
        </nav>
        
    </div>
</div>

{{ style_push }}
    <style>
        @scope(.mobil_menu){
            :scope{
                background-color: color-mix(in oklch, {{ theme_settings.header.settings.color_scheme.text_color }}, transparent 10% );
                color: {{ theme_settings.header.settings.color_scheme.text_color }};

                > div{
                    background-color: {{ theme_settings.header.settings.color_scheme.background_color }};
                }
            }
        }
    </style>
{{ /style_push }}

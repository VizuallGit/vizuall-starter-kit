title: 'Entries style 1'
fields:
  -
    handle: section_heading
    field: common.section_heading
    config:
      validate:
        - required
  -
    handle: entries
    field:
      type: replicator
      display: Entries
      collapse: accordion
      sets:
        new_set_group:
          display: 'New Set Group'
          sets:
            item:
              display: Item
              fields:
                -
                  handle: image
                  field:
                    container: assets
                    max_files: 1
                    type: assets
                    display: Image
                    if:
                      $parent.settings.show_image: 'equals true'
                -
                  handle: text
                  field:
                    buttons:
                      - bts_styles
                      - h3
                      - bold
                      - italic
                      - removeformat
                      - anchor
                      - text_100
                      - text_200
                      - text_300
                      - text_400
                      - text_500
                      - text_600
                      - text_700
                      - text_800
                      - text_900
                    container: assets
                    remove_empty_nodes: false
                    type: bard
                    display: Text
                    bts_styles:
                      - text_100
                      - text_200
                      - text_300
                      - text_400
                      - text_500
                      - text_600
                      - text_700
                      - text_800
                      - text_900
                -
                  import: links
  -
    handle: show_settings
    field:
      type: revealer
      display: 'Show settings'
  -
    handle: settings
    field:
      type: tabby
      display: Settings
      if:
        show_settings: 'equals true'
      fields:
        -
          handle: main
          field:
            type: tab
            display: Main
        -
          handle: color_scheme
          field:
            type: color_scheme_selector
            display: 'Color Scheme'
        -
          handle: section_heading_sr_only
          field:
            type: toggle
            display: 'Hide section heading'
        -
          handle: show_image
          field:
            type: toggle
            display: 'Show image'
        -
          handle: aspect_ratio
          field: common.aspect_ratio
          config:
            if:
              show_image: 'equals true'
        -
          handle: offset
          field: common.offset
          config:
            display: 'Offset entries'
        -
          handle: spacing
          field:
            type: tab
            display: Spacing
        -
          handle: padding
          field: common.section_spacing
          config:
            display: Padding
        -
          handle: custom
          field:
            type: tab
            display: Custom
        -
          handle: css
          field:
            type: css_editor
            display: CSS
